# =============================================================================
# CRM2 production stack — AWS flavor (EC2 behind ALB, crm.allcheckservices.com).
#
# Differences from docker-compose.yml (the single-box/staging flavor):
#   * NO db container       → RDS  (crm2-prod, Postgres 18, Asia/Kolkata param group)
#   * NO minio container    → S3   (bucket crm2-prod-824826126880; SDK default endpoint)
#   * edge listens on :80 only → the ALB terminates TLS (ACM cert, auto-renewing)
#   * nginx.aws.conf        → no TLS/acme/minio blocks; realip from the ALB
#
# deploy.sh picks this file when /opt/crm2/.aws-box exists on the box.
# Secrets arrive ONLY via env_file (/opt/crm2/secrets/.env.prod, mode 600).
# DATABASE_URL uses sslmode=require&sslrootcert=/run/secrets/rds-ca.pem — the
# bundled pg driver treats `require` as verify-full, so the RDS CA bundle
# (truststore.pki.rds.amazonaws.com, at /opt/crm2/secrets/rds-ca.pem) is
# mounted into BOTH db-touching containers; psql (migrate) accepts the same URL.
# =============================================================================
name: crm2

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '10'

services:
  # One-shot tracked migration runner (db/v2/migrate.sh) against RDS.
  migrate:
    image: postgres:18-alpine
    container_name: crm2_migrate
    working_dir: /repo
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../../:/repo:ro
      - /opt/crm2/secrets/rds-ca.pem:/run/secrets/rds-ca.pem:ro
    entrypoint:
      - /bin/sh
      - db/v2/migrate.sh
    restart: 'no'
    mem_limit: 512m
    cpus: '1'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/acsdeveloper2025}/crm2-api:${IMAGE_TAG:-latest}
    container_name: crm2_api
    init: true
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      ROLE: api
      NODE_ENV: production
      PORT: '4000'
      # libuv threadpool (ADR-0076): scrypt + sharp + PDF run here — see docker-compose.yml.
      UV_THREADPOOL_SIZE: '16'
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account
    env_file:
      - ${ENV_FILE:-/opt/crm2/secrets/.env.prod}
    volumes:
      - /opt/crm2/secrets/rds-ca.pem:/run/secrets/rds-ca.pem:ro
    secrets:
      - firebase-service-account
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/v2/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    shm_size: 1gb
    mem_limit: 2g
    cpus: '2'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  edge:
    image: ${IMAGE_REGISTRY:-ghcr.io/acsdeveloper2025}/crm2-web:${IMAGE_TAG:-latest}
    container_name: crm2_edge
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./nginx.aws.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/_edge_health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    cpus: '1'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

secrets:
  firebase-service-account:
    file: ${FIREBASE_SECRET_FILE:-/opt/crm2/secrets/firebase-service-account.json}
