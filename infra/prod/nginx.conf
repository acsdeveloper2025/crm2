# =============================================================================
# CRM2 edge nginx — declarative, version-controlled, NEVER mutated at deploy.
#
#   * TLS termination on :443 (Let's Encrypt cert mounted from /etc/letsencrypt)
#   * HTTP :80 → HTTPS redirect (+ serves /.well-known/acme-challenge for renewal)
#   * /api/*       → api:4000        (REST + the /api/v2/health probe)
#   * /socket.io/* → api:4000        (WebSocket upgrade)
#   * /crm2-prod/* → minio:9000      (presigned object reads; Host preserved so the
#                    presign signature validates — MinIO path-style behind proxy)
#   * Static SPA: hashed assets cached 1y, index.html no-cache, catch-all → index.html
#   * /_edge_health static 200 for the container healthcheck
#
# Hostname: crm.allcheckservices.com (existing DNS + cert reused from v1).
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name crm.allcheckservices.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location = /_edge_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name crm.allcheckservices.com;

    ssl_certificate     /etc/letsencrypt/live/crm.allcheckservices.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.allcheckservices.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json
               application/xml+rss application/atom+xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # 50 MB — field photo + report upload budget.
    client_max_body_size 50m;

    location = /_edge_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- API + Socket.IO → api:4000 ---------------------------------------
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 120s covers PDF generation + large uploads.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /socket.io/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- Object storage (presigned reads) → minio:9000 --------------------
    # Path-style: the presigned URL is https://$host/crm2-prod/<key>?X-Amz-...
    # MinIO recomputes the signature from the incoming Host header, so it MUST be
    # preserved unchanged. Objects are private — only valid presigned requests pass.
    location /crm2-prod/ {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        client_max_body_size 50m;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.html; }
}
