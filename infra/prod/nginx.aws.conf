# =============================================================================
# CRM2 edge nginx — AWS flavor (plain :80 behind the ALB, which terminates TLS
# with the ACM cert). Mirrors nginx.conf minus TLS/acme/minio:
#
#   * NO :443 block, NO acme webroot          → ALB owns HTTPS + cert renewal
#   * NO /crm2-prod/ minio proxy              → presigned URLs point straight at S3
#   * realip from the VPC CIDR                → rate limit keys on the CLIENT ip,
#     not the ALB's private ip (otherwise all users share one bucket)
#   * X-Forwarded-Proto passes the ALB's header through (NOT $scheme, which is
#     always http here) so the api still sees https and secure cookies survive
#   * CSP img-src/connect-src additionally allow the S3 bucket origin (photos
#     are now served from S3 directly, no longer same-origin)
# =============================================================================

limit_req_zone $binary_remote_addr zone=api_rl:10m rate=10r/s;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name crm.allcheckservices.com;

    # ALB lives in the default VPC; trust its X-Forwarded-For for the client ip.
    set_real_ip_from 172.31.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json
               application/xml+rss application/atom+xml image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # 50 MB — field photo + report upload budget.
    client_max_body_size 50m;

    # Security response headers — same set as nginx.conf; CSP img-src/connect-src
    # add the S3 origin (presigned photo reads are cross-origin on AWS).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; font-src 'self' data:; connect-src 'self' https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location = /_edge_health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ---- API + Socket.IO → api:4000 ---------------------------------------
    location /api/ {
        limit_req zone=api_rl burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    location /socket.io/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # repeated: a location-level add_header stops inheriting the server-level ones above.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; font-src 'self' data:; connect-src 'self' https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # repeated: a location-level add_header stops inheriting the server-level ones above.
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; font-src 'self' data:; connect-src 'self' https://crm2-prod-824826126880.s3.ap-south-1.amazonaws.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;
        try_files $uri =404;
    }

    location / { try_files $uri $uri/ /index.html; }
}
