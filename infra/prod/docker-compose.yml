# =============================================================================
# CRM2 production stack (single box behind crm.allcheckservices.com).
#
# Invoked by infra/prod/deploy.sh over SSH:
#   docker compose -f infra/prod/docker-compose.yml --env-file /opt/crm2/secrets/.env.prod up -d
#
# Services: db (pg18) · minio (+init) · migrate (one-shot) · api · edge.
# valkey + out-of-process worker/report tiers are commented below — enable when
# the job tier moves out-of-process (today jobs run IN the api, REDIS_* unset).
#
# Secrets arrive ONLY via env_file (/opt/crm2/secrets/.env.prod, mode 600, never
# committed) + the firebase file mount. Images stay environment-neutral.
#
# Logging (audit LOGGING-03, docs/audit/14-logging.md): every service caps its json-file
# driver at 20m x 10 files (200m/service ceiling) so stdout logs can no longer grow the
# single box's disk unbounded — the same failure mode as the 2026-06-26 disk-exhaustion
# outage (that one was un-pruned image layers; this closes the log-growth analogue).
# =============================================================================
name: crm2

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '10'

services:
  db:
    image: postgres:18-alpine
    container_name: crm2_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
    volumes:
      # PG18: data dir is /var/lib/postgresql (NOT /…/data) — see dev compose note.
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 4g
    cpus: '2'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  minio:
    image: minio/minio:latest
    container_name: crm2_minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 1g
    cpus: '1'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  minio-init:
    image: minio/mc:latest
    container_name: crm2_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY_ID} ${S3_SECRET_ACCESS_KEY}; do sleep 1; done;
      mc mb -p local/${S3_BUCKET};
      exit 0;
      "
    restart: 'no'
    mem_limit: 256m
    cpus: '0.5'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # One-shot: apply the 66 idempotent SQL migrations (ON_ERROR_STOP) then the
  # seeds (best-effort). Runs from the repo root so the locations \copy FROM
  # PROGRAM 'gzip -dc db/v2/seed/…' relative path resolves.
  migrate:
    image: postgres:18-alpine
    container_name: crm2_migrate
    depends_on:
      db:
        condition: service_healthy
    working_dir: /repo
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../../:/repo:ro
    # Tracked runner (db/v2/migrate.sh): applies only NEW or EDITED migrations via
    # schema_migrations, then the idempotent data seeds. Replaces the every-deploy full
    # replay so a late migration can no longer break an earlier one on re-run (0037/0083).
    entrypoint:
      - /bin/sh
      - db/v2/migrate.sh
    restart: 'no'
    mem_limit: 512m
    cpus: '1'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/acsdeveloper2025}/crm2-api:${IMAGE_TAG:-latest}
    container_name: crm2_api
    init: true
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ROLE: api
      NODE_ENV: production
      PORT: '4000'
      # libuv threadpool (ADR-0076): scrypt (N=16384, ~2s) + sharp + PDF all run here; the default 4
      # serializes concurrent logins into an API-wide stall. 16 keeps login latency flat under load
      # (bounded — scrypt is ~16MB/hash against the 2g mem_limit).
      UV_THREADPOOL_SIZE: '16'
      FIREBASE_SERVICE_ACCOUNT_PATH: /run/secrets/firebase-service-account
    env_file:
      - ${ENV_FILE:-/opt/crm2/secrets/.env.prod}
    secrets:
      - firebase-service-account
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:4000/api/v2/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    shm_size: 1gb
    mem_limit: 2g
    cpus: '2'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  edge:
    image: ${IMAGE_REGISTRY:-ghcr.io/acsdeveloper2025}/crm2-web:${IMAGE_TAG:-latest}
    container_name: crm2_edge
    init: true
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/_edge_health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 256m
    cpus: '1'
    logging: *default-logging
    security_opt:
      - no-new-privileges:true

  # ---- FUTURE: malware scanning (enable with AV_SCAN_HOST set) --------------
  # FILE_UPLOAD-01 (docs/audit/08-file-upload.md): magic-byte validation confirms a file's TYPE, never
  # its content. apps/api/src/platform/av.ts scans every attachment/photo/avatar upload via this clamd
  # sidecar's INSTREAM protocol when AV_SCAN_HOST=clamav is set; unset (today), uploads skip scanning
  # exactly as before this existed — same commented-until-enabled pattern as valkey below.
  # clamav:
  #   image: clamav/clamav:stable
  #   container_name: crm2_clamav
  #   restart: unless-stopped
  #   healthcheck: { test: ["CMD","clamdcheck.sh"], interval: 30s, timeout: 10s, retries: 10, start_period: 90s }
  #   volumes: [clamavdata:/var/lib/clamav]
  #   mem_limit: 2g
  #   logging: *default-logging
  #   security_opt: [no-new-privileges:true]
  # api: { <<: *api-like, depends_on: { clamav: { condition: service_healthy } } }

  # ---- FUTURE: out-of-process job tier (enable with REDIS_QUEUE_URL set) -----
  # REDIS_CACHE-02 (docs/audit/12-redis-cache.md): noeviction with NO --maxmemory ceiling means an OOM
  # kill instead of a controlled reject once the box's memory fills — added a ceiling + mem_limit
  # matching every other service in this file.
  # valkey:
  #   image: valkey/valkey:8-alpine
  #   container_name: crm2_valkey
  #   restart: unless-stopped
  #   command: ["valkey-server","--requirepass","${VALKEY_PASSWORD}","--appendonly","yes","--maxmemory-policy","noeviction","--maxmemory","512mb"]
  #   volumes: [valkeydata:/data]
  #   healthcheck: { test: ["CMD","valkey-cli","-a","${VALKEY_PASSWORD}","ping"], interval: 10s, timeout: 5s, retries: 5 }
  #   mem_limit: 768m
  #   cpus: '1'
  #   logging: *default-logging
  #   security_opt: [no-new-privileges:true]
  # worker:   { <<: *api-like, environment: { ROLE: worker } }
  # report-worker: { <<: *api-like, environment: { ROLE: report } }

volumes:
  pgdata:
    name: crm2_pgdata
  miniodata:
    name: crm2_miniodata
  certbot_webroot:
    name: crm2_certbot_webroot
  # valkeydata: { name: crm2_valkeydata }
  # clamavdata: { name: crm2_clamavdata }

secrets:
  firebase-service-account:
    file: ${FIREBASE_SECRET_FILE:-/opt/crm2/secrets/firebase-service-account.json}
